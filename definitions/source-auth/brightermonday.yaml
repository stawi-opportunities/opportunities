# BrighterMonday Kenya — extension-captured session, HTTP-form replay.
#
# Loaded at boot by pkg/authmanifest into the in-process Store. The
# extension fetches the public projection via GET /sources/auth-manifest;
# the UI fetches the full manifest (including instructions_md) via
# GET /sources/brightermonday/auth.
#
# The form_url_pattern is anchored on /job/.+/apply to avoid the
# autoapply submitter trying to POST against listing pages or the
# saved-jobs UI by accident — false positives are silently dropped by
# the Registry, but tight scoping makes log triage easier.

source_type: brightermonday
auth_method: extension
display_name: BrighterMonday Kenya
login_url: https://www.brightermonday.co.ke/login
home_url: https://www.brightermonday.co.ke
cookie_domains:
  - .brightermonday.co.ke
storage_keys: []
# required_cookies disabled in local dev — BrighterMonday's real cookie
# names may differ from these guesses. Without the check the extension
# captures whatever exists on .brightermonday.co.ke and we let matching
# accept it. The replay leg is the next thing that will validate the
# session against the apply form, which is where we want the real
# validation to happen anyway.
required_cookies: []
session_ttl: 720h
# Real BM logged-in probe. /account/customer/enquiries is the
# candidate's "my applications" dashboard — returns 200 when the
# session is valid, 302 → /login when it's not. The extension uses
# this both for the auto-capture gate AND the popup's per-source
# status indicator ("Logged in" vs "Not logged in").
detect_logged_in:
  method: GET
  url: https://www.brightermonday.co.ke/account/customer/enquiries
  expect_status: 200
apply_flow:
  type: http_form
  # Matches both legacy /job/<id>/apply and current /listings/<slug>
  # URL shapes. The replay leg parses the page for a <form> action so
  # the exact apply-page URL doesn't have to be the form-submission URL.
  form_url_pattern: '^https://www\.brightermonday\.co\.ke/(job/.+/apply|listings/.+)$'
  fields:
    cv_file:
      name: resume
      source: cv_bytes
    cover_letter:
      name: cover_letter
      source: cover_letter
    phone:
      name: phone
      source: phone
    full_name:
      name: full_name
      source: full_name
  csrf:
    source: cookie
    cookie: XSRF-TOKEN
    header: X-XSRF-TOKEN
instructions_md: |
  ### Connect BrighterMonday

  1. **Install the Stawi extension** from the Chrome Web Store or Firefox Add-ons.
  2. Go to <https://www.brightermonday.co.ke/login> and sign in to your BrighterMonday account.
  3. Click the **Stawi** icon in your browser toolbar and choose **"Connect this account"**.
  4. Return to this page — the BrighterMonday card should flip to **Connected ✓**.

  Stawi will only access BrighterMonday while submitting applications you've approved.
  You can disconnect at any time from this page.

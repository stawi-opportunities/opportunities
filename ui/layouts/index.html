{{ define "main" }}

{{/* HomeRedirect island: signed-in visitors go straight to /dashboard/. */}}
<div id="mount-home-redirect"></div>

<section id="home-hero" class="flex min-h-[calc(100vh-3.5rem)] flex-col items-center justify-center bg-white px-4 py-16 sm:py-20">
  <div class="mx-auto flex w-full max-w-lg flex-col items-center text-center">

    {{/* Photo — torn-edge frame like the reference */}}
    <div class="home-hero-photo relative w-[min(72vw,280px)] sm:w-[300px]" aria-hidden="true">
      <img
        src="/images/hero-jobs.jpg"
        alt=""
        width="600"
        height="800"
        class="h-auto w-full object-cover"
        fetchpriority="high"
        decoding="async"
      />
    </div>

    <h1 class="mt-10 text-[clamp(2rem,6vw,3.25rem)] font-black uppercase leading-[1.05] tracking-tight text-navy-900">
      Find work that fits
    </h1>

    <p class="mt-4 max-w-md text-base leading-relaxed text-gray-600 sm:text-lg">
      Sign in for personalized matches and connect with employers looking for candidates like you.
    </p>

    <a
      href="/onboarding/"
      class="mt-8 inline-flex items-center gap-2 rounded-full bg-navy-900 px-8 py-3.5 text-base font-semibold text-white shadow-sm transition hover:bg-navy-800 focus:outline-none focus-visible:ring-2 focus-visible:ring-navy-900 focus-visible:ring-offset-2"
    >
      Get Started
      <span aria-hidden="true">→</span>
    </a>

  </div>
</section>

<style>
  /* Soft torn-paper edge on the hero photo */
  .home-hero-photo {
    filter: drop-shadow(0 12px 28px rgba(12, 18, 38, 0.12));
  }
  .home-hero-photo img {
    clip-path: polygon(
      3% 1%, 8% 3%, 14% 0%, 22% 2%, 30% 0%, 38% 3%, 46% 1%, 54% 3%, 62% 0%,
      70% 2%, 78% 0%, 86% 3%, 93% 1%, 98% 4%, 100% 12%, 98% 22%, 100% 32%,
      97% 42%, 100% 52%, 98% 62%, 100% 72%, 97% 82%, 100% 90%, 96% 97%,
      88% 100%, 80% 97%, 72% 100%, 64% 98%, 56% 100%, 48% 97%, 40% 100%,
      32% 98%, 24% 100%, 16% 97%, 8% 100%, 2% 96%, 0% 88%, 2% 78%, 0% 68%,
      3% 58%, 0% 48%, 2% 38%, 0% 28%, 3% 18%, 0% 8%
    );
  }
</style>

<script>
  try {
    if (localStorage.getItem('stawi.authed') === '1') {
      var hero = document.getElementById('home-hero');
      if (hero) hero.style.display = 'none';
    }
  } catch (e) {}
</script>

{{ end }}

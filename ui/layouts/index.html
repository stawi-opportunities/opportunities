{{ define "main" }}

{{/* HomeRedirect island: signed-in visitors go straight to /dashboard/. */}}
<div id="mount-home-redirect"></div>

<section id="home-hero" class="bg-[#060b18] text-white">
  <div class="mx-auto max-w-3xl px-4 py-20 sm:px-6 sm:py-28 lg:px-8">
    <h1 class="text-center text-3xl font-bold tracking-tight sm:text-4xl">
      Find jobs
    </h1>

    <form action="/search/" method="GET" role="search" class="mt-8">
      <div class="flex flex-col overflow-hidden rounded-xl bg-white shadow-lg sm:flex-row sm:items-stretch">
        <div class="relative flex min-w-0 flex-1 items-center border-b border-gray-200 sm:border-b-0 sm:border-r">
          <label for="home-search-q" class="sr-only">What</label>
          <input id="home-search-q" type="search" name="q"
            placeholder="Title, skill, or company"
            autocomplete="off"
            class="w-full bg-transparent py-3.5 pl-4 pr-3 text-base text-gray-900 placeholder-gray-400 focus:outline-none"/>
        </div>
        <div class="relative flex min-w-0 flex-1 items-center">
          <label for="home-search-l" class="sr-only">Where</label>
          <input id="home-search-l" type="search" name="l"
            placeholder="City, country, or remote"
            autocomplete="off"
            class="w-full bg-transparent py-3.5 pl-4 pr-3 text-base text-gray-900 placeholder-gray-400 focus:outline-none"/>
        </div>
        <div class="flex p-1.5 sm:pl-0">
          <button type="submit"
            class="w-full rounded-lg bg-[#219c3f] px-6 py-3 text-sm font-semibold text-white hover:bg-[#45b739] sm:w-auto">
            Search
          </button>
        </div>
      </div>
    </form>

    <p class="mt-6 text-center text-sm text-gray-400">
      <a href="/onboarding/" class="text-white underline-offset-2 hover:underline">Get free matches</a>
      <span class="mx-2 text-gray-600">·</span>
      <a href="/pricing/" class="text-gray-400 underline-offset-2 hover:underline">Pricing</a>
    </p>
  </div>
</section>

<script>
  try {
    if (localStorage.getItem('stawi.authed') === '1') {
      var hero = document.getElementById('home-hero');
      if (hero) hero.style.display = 'none';
    }
  } catch (e) {}
</script>

{{ end }}

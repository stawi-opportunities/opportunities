{{ define "main" }}
<!-- Rendered by ui/app/src/components/AuthCallback.tsx. This route only
     exists so the OAuth popup has something same-origin to land on; the
     parent polls popup.location, reads ?code=, closes it. -->
<div id="mount-auth-callback">
  <div class="flex min-h-[60vh] items-center justify-center px-4 py-16">
    <div class="w-full max-w-md text-center">
      <div class="mx-auto h-8 w-8 animate-spin rounded-full border-4 border-accent-500 border-t-transparent" aria-label="Completing sign in"></div>
      <p class="mt-4 text-gray-600">Completing sign in…</p>
    </div>
  </div>
</div>
{{ end }}

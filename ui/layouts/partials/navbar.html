<!-- Static navbar skeleton — matches Nav.tsx exactly to prevent layout shift
     before React hydrates #mount-nav. Also includes a plain-JS hamburger
     toggle so the nav is usable on mobile before React boots. -->
<div id="mount-nav">
  <header class="sticky top-0 z-40 border-b border-gray-100 bg-white/95 shadow-sm backdrop-blur-xl">
    <div class="mx-auto flex h-16 max-w-7xl items-center justify-between gap-4 px-4 sm:px-6 lg:px-8">
      <a href="/" class="flex-shrink-0" aria-label="Stawi Jobs — Growing together">
        <img src="/images/logo.svg" alt="Stawi" height="36" class="h-9 w-auto"/>
      </a>

      {{/* Hamburger — visible on mobile only */}}
      <button id="nav-toggle" class="mr-auto ml-4 inline-flex items-center justify-center rounded-md p-2 text-gray-500 hover:bg-gray-100 hover:text-gray-700 focus:outline-none focus:ring-2 focus:ring-navy-900 md:hidden" type="button" aria-controls="mobile-menu" aria-expanded="false" aria-label="Toggle navigation menu">
        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/>
        </svg>
      </button>

      <nav class="hidden items-center gap-1 md:flex" aria-label="Main navigation">
        <a href="/search/"     class="rounded-md px-3 py-2 text-sm font-medium text-gray-600">Find jobs</a>
        <a href="/jobs/"       class="rounded-md px-3 py-2 text-sm font-medium text-gray-600">Browse jobs</a>
        <a href="/categories/" class="rounded-md px-3 py-2 text-sm font-medium text-gray-600">Categories</a>
        <a href="/pricing/"    class="rounded-md px-3 py-2 text-sm font-medium text-gray-600">Pricing</a>
        <a href="/about/"      class="rounded-md px-3 py-2 text-sm font-medium text-gray-600">About</a>
      </nav>
      <div class="flex items-center gap-2">
        <a href="/onboarding/" class="inline-flex items-center rounded-lg bg-navy-900 px-4 py-2 text-sm font-semibold text-white">
          Get started
        </a>
      </div>
    </div>

    {{/* Mobile menu — hidden by default, toggled by #nav-toggle */}}
    <div id="mobile-menu" class="hidden border-t border-gray-100 px-4 pb-4 pt-2 md:hidden" role="navigation" aria-label="Mobile navigation">
      <a href="/search/" class="block rounded-md px-3 py-2 text-base font-medium text-gray-600 hover:bg-gray-50 hover:text-gray-900">Find jobs</a>
      <a href="/jobs/" class="block rounded-md px-3 py-2 text-base font-medium text-gray-600 hover:bg-gray-50 hover:text-gray-900">Browse jobs</a>
      <a href="/categories/" class="block rounded-md px-3 py-2 text-base font-medium text-gray-600 hover:bg-gray-50 hover:text-gray-900">Categories</a>
      <a href="/pricing/" class="block rounded-md px-3 py-2 text-base font-medium text-gray-600 hover:bg-gray-50 hover:text-gray-900">Pricing</a>
      <a href="/about/" class="block rounded-md px-3 py-2 text-base font-medium text-gray-600 hover:bg-gray-50 hover:text-gray-900">About</a>
      <a href="/faq/" class="block rounded-md px-3 py-2 text-base font-medium text-gray-600 hover:bg-gray-50 hover:text-gray-900">FAQ</a>
    </div>
  </header>
</div>

<script>
(function(){
  var btn = document.getElementById('nav-toggle');
  var menu = document.getElementById('mobile-menu');
  if (btn && menu) {
    btn.addEventListener('click', function(){
      var expanded = btn.getAttribute('aria-expanded') === 'true';
      btn.setAttribute('aria-expanded', !expanded);
      menu.classList.toggle('hidden');
      menu.classList.toggle('block');
    });
    document.addEventListener('click', function(e){
      if (!btn.contains(e.target) && !menu.contains(e.target)) {
        btn.setAttribute('aria-expanded', 'false');
        menu.classList.add('hidden');
        menu.classList.remove('block');
      }
    });
  }
})();
</script>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} — {{ .Site.Title }}{{ end }}</title>
<meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">

<!-- Open Graph -->
<meta property="og:title" content="{{ .Title }}">
<meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
<meta property="og:type" content="{{ if .IsHome }}website{{ else }}article{{ end }}">
<meta property="og:url" content="{{ .Permalink }}">
<meta property="og:site_name" content="{{ .Site.Title }}">

<!-- Twitter -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ .Title }}">
<meta name="twitter:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">

<!-- Canonical -->
<link rel="canonical" href="{{ .Permalink }}">

<!-- Runtime config consumed by the React app (see ui/app/src/utils/config.ts).
     All per-environment values flow through here via HUGO_PARAMS_* at build time. -->
<meta name="site-params" content='{{ dict
    "apiURL"             .Site.Params.apiURL
    "candidatesAPIURL"   .Site.Params.candidatesAPIURL
    "contentOrigin"      .Site.Params.contentOrigin
    "oidcIssuer"         .Site.Params.oidcIssuer
    "oidcClientID"       .Site.Params.oidcClientID
    "oidcInstallationID" .Site.Params.oidcInstallationID
    "oidcRedirectURI"    .Site.Params.oidcRedirectURI
  | jsonify }}'>

<!-- CSS: Tailwind source now includes ui/app/src/**/*.{ts,tsx} so classes
     used in React components generate into main.css at Hugo build time. -->
{{ $css := resources.Get "css/main.css" | css.PostCSS | minify | fingerprint }}
<link rel="stylesheet" href="{{ $css.RelPermalink }}" integrity="{{ $css.Data.Integrity }}">

<!-- Warm auth + content + jobs-API connections so the first click /
     snapshot fetch / search doesn't pay cold DNS + TLS latency. -->
<link rel="preconnect" href="{{ .Site.Params.oidcIssuer | default "https://oauth2.stawi.org" }}" crossorigin>
<link rel="preconnect" href="{{ .Site.Params.contentOrigin | default "https://jobs-repo.stawi.org" }}" crossorigin>
{{ with .Site.Params.apiURL }}<link rel="preconnect" href="{{ (urls.Parse .).Scheme }}://{{ (urls.Parse .).Host }}" crossorigin>{{ end }}

<!-- Preload fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- React app entry. In `hugo server` we load directly from the Vite dev
     server (HMR); in production we load the hashed bundle recorded in
     data/app_manifest.json by the Vite build. -->
{{ if hugo.IsServer }}
  <script type="module" src="http://localhost:5173/@vite/client"></script>
  <script type="module" src="http://localhost:5173/src/main.tsx"></script>
{{ else }}
  {{ with (index hugo.Data "app_manifest") }}
    {{ with (index . "main.css") }}<link rel="stylesheet" href="/{{ . }}">{{ end }}
    {{ with (index . "main.js") }}<script type="module" src="/{{ . }}"></script>{{ end }}
  {{ end }}
{{ end }}

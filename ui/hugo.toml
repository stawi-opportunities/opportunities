baseURL = "https://opportunities.stawi.org/"
languageCode = "en"
title = "Stawi Jobs"

[params]
  description = "Search jobs free by title and location. Upload a CV for a real match shortlist before you pay. Apply when you're ready."
  # Defaults point at the exposed Stawi cluster so `make ui-dev` works out of
  # the box against real data. For developers running the backend locally,
  # use `make ui-dev-local` (overrides apiURL/candidatesAPIURL to localhost).
  # Each backend gets one short path prefix on api.stawi.org (org-wide
  # convention; see api-gateway-path-prefix-convention memory):
  #   /jobs/*     → opportunities-api      (apiURL embeds the prefix)
  #   /matching/* → opportunities-matching (callers prefix paths inline,
  #                 since runtime.fetch is shared with @stawi/profile
  #                 which targets /profile.v1.* directly).
  apiURL = "https://api.stawi.org/jobs"
  candidatesAPIURL = "https://api.stawi.org"
  # OIDC — Thesa's Ory Hydra at oauth2.stawi.org.
  # JWKS:       https://oauth2.stawi.org/.well-known/jwks.json
  # Discovery:  https://oauth2.stawi.org/.well-known/openid-configuration
  #
  # Production defaults live here so CF Pages works with zero env-var config.
  # oidcInstallationID is the PARTITION XID (not the tenant XID) — the login
  # UI routes on partition context. scripts/dev.sh passes HUGO_PARAMS_oidc*
  # overrides to swap in the Development partition client for local work.
  #
  # oidcRedirectURI is intentionally *not* pinned to a single host. config.ts
  # falls back to `${window.location.origin}/auth/callback/`, so sign-in
  # completes on whichever host the user is on (jobs.stawi.org primary,
  # opportunities.stawi.org alias). Origin-scoped sessionStorage and
  # IndexedDB mean the PKCE verifier and tokens cannot cross origins — if we
  # hardcoded one host here, sign-in from the other alias would land tokens
  # on the wrong origin and the dashboard would show "Sign in to continue"
  # despite a successful Hydra exchange. Every alias's
  # `https://<host>/auth/callback/` must be registered on the Hydra client
  # (oidcClientID) or Hydra rejects the auth request as invalid_redirect_uri.
  # Override at build time via HUGO_PARAMS_oidcRedirectURI when you need to
  # pin a callback (e.g. the Makefile ui-dev target pins :5170).
  oidcIssuer         = "https://oauth2.stawi.org"
  # Production public SPA client + partition (tenancy greenfield seed).
  # Dev/local: override with HUGO_PARAMS_oidcClientID=d7is2kspf2t7cl19qlpg
  # and HUGO_PARAMS_oidcInstallationID=d7gi6lkpf2t67dlsqrhg.
  oidcClientID       = "d7is2kspf2t7cl19qlp0"
  oidcInstallationID = "d7gi6lkpf2t67dlsqreg"

  # PostHog — posthogApiKey is the public project API key ("phc_..."),
  # safe to ship in the browser. posthogHost overrides the default
  # ingest origin (us.i.posthog.com) — set it for the EU region
  # (eu.i.posthog.com) or a self-hosted instance. Empty defaults keep
  # branch previews / local dev silent; the SDK only initialises when
  # posthogApiKey is non-empty. Populate via HUGO_PARAMS_posthogApiKey
  # at build time, or paste the value here once you've created the
  # project at app.posthog.com → Settings → Project → Project API key.
  posthogApiKey      = ""
  posthogHost        = ""

[params.nav]
  logo = "/images/logo.svg"

# [taxonomies] intentionally omitted — category pages are API-driven, not
# taxonomy-generated. At millions of jobs, taxonomy-term pages are not a
# useful or scalable surface.

[pagination]
  pagerSize = 20

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]

[sitemap]
  changefreq = "daily"
  priority = 0.5
  filename = "sitemap.xml"

[build]
  [build.buildStats]
    enable = true

[module]
  [module.hugoVersion]
    extended = true
    min = "0.128.0"

baseURL = "https://jobs.stawi.org/"
languageCode = "en"
title = "Stawi Jobs — Remote Jobs in Africa and Beyond"

[params]
  description = "Find remote jobs from top companies hiring worldwide. Browse positions in programming, design, marketing, and more."
  # Defaults point at the exposed Stawi cluster so `make ui-dev` works out of
  # the box against real data. For developers running the backend locally,
  # use `make ui-dev-local` (overrides apiURL/candidatesAPIURL to localhost).
  # The gateway exposes the jobs service under a /jobs path prefix on the
  # shared api.stawi.org host.
  apiURL = "https://api.stawi.org/jobs"
  candidatesAPIURL = "https://api.stawi.org"
  contentOrigin = "https://jobs-repo.stawi.org"
  # OIDC — Thesa's Ory Hydra at oauth2.stawi.org.
  # JWKS:       https://oauth2.stawi.org/.well-known/jwks.json
  # Discovery:  https://oauth2.stawi.org/.well-known/openid-configuration
  #
  # Staging values default here (stawi.jobs Development partition in Thesa).
  # oidcInstallationID is the PARTITION XID, not the tenant XID — the login UI
  # routes on partition context.
  # Production overrides via HUGO_PARAMS_oidc* on the CF Pages project:
  #   HUGO_PARAMS_oidcClientID=stawi-jobs-web
  #   HUGO_PARAMS_oidcInstallationID=d7gi6lkpf2t67dlsqreg
  #   HUGO_PARAMS_oidcRedirectURI=https://jobs.stawi.org/auth/callback/
  oidcIssuer         = "https://oauth2.stawi.org"
  oidcClientID       = "stawi-jobs-web-dev"
  oidcInstallationID = "d7gi6lkpf2t67dlsqrhg"
  oidcRedirectURI    = "http://localhost:5170/auth/callback/"

[params.nav]
  logo = "/images/logo.svg"

# [taxonomies] intentionally omitted — category pages are API-driven, not
# taxonomy-generated. At millions of jobs, taxonomy-term pages are not a
# useful or scalable surface.

[pagination]
  pagerSize = 20

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]

[sitemap]
  changefreq = "daily"
  priority = 0.5
  filename = "sitemap.xml"

[build]
  [build.buildStats]
    enable = true

[module]
  [module.hugoVersion]
    extended = true
    min = "0.128.0"

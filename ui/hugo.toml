baseURL = "https://jobs.stawi.org/"
languageCode = "en"
title = "Stawi Jobs — Remote Jobs in Africa and Beyond"

[params]
  description = "Find remote jobs from top companies hiring worldwide. Browse positions in programming, design, marketing, and more."
  apiURL = "http://localhost:8082"
  candidatesAPIURL = "http://localhost:8080"
  contentOrigin = "https://content.stawi.jobs"
  # OIDC — dev defaults. Staging/prod values are injected at deploy time via
  # HUGO_PARAMS_OIDCISSUER / HUGO_PARAMS_OIDCCLIENTID / HUGO_PARAMS_OIDCREDIRECTURI
  # env vars (Hugo auto-reads HUGO_PARAMS_* into [params]).
  oidcIssuer = "https://auth-dev.antinvestor.com"
  oidcClientID = "stawi-jobs-web-dev"
  oidcRedirectURI = "http://localhost:5170/auth/callback/"

[params.nav]
  logo = "/images/logo.svg"

# [taxonomies] intentionally omitted — category pages are API-driven, not
# taxonomy-generated. At millions of jobs, taxonomy-term pages are not a
# useful or scalable surface.

[pagination]
  pagerSize = 20

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]

[sitemap]
  changefreq = "daily"
  priority = 0.5
  filename = "sitemap.xml"

[build]
  [build.buildStats]
    enable = true

[module]
  [module.hugoVersion]
    extended = true
    min = "0.128.0"

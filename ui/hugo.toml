baseURL = "https://jobs.stawi.org/"
languageCode = "en"
title = "Stawi Jobs — Remote Jobs in Africa and Beyond"

[params]
  description = "Find remote jobs from top companies hiring worldwide. Browse 37,000+ positions in programming, design, marketing, and more."
  apiURL = "http://localhost:8082"
  candidatesAPIURL = "http://localhost:8080"
  oidcIssuer = "https://auth-dev.antinvestor.com"
  oidcClientID = "stawi-jobs-web-dev"
  oidcRedirectURI = "http://localhost:1313/auth/callback/"

[params.nav]
  logo = "/images/logo.svg"

[taxonomies]
  category = "categories"

[pagination]
  pagerSize = 20

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]

[sitemap]
  changefreq = "daily"
  priority = 0.5
  filename = "sitemap.xml"

[build]
  [build.buildStats]
    enable = true

[module]
  [module.hugoVersion]
    extended = true
    min = "0.128.0"

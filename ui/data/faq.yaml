categories:
  - category: "Getting Started"
    questions:
      - q: "What is Stawi Jobs?"
        a: "Stawi Jobs is an AI-powered opportunity matching platform. We aggregate jobs, scholarships, tenders, deals, and funding from thousands of sources worldwide, run them through a quality gate, and surface the ones most relevant to you."
      - q: "Is Stawi Jobs free?"
        a: "Search and browsing are always free, with or without an account. Paid plans unlock AI matching: Starter ($10) for digests you apply to yourself, or Managed ($200) for unlimited discovery, auto applications, and interview prep."
      - q: "Do I need an account to search?"
        a: "No. You can browse and search all opportunities without signing up. Creating an account lets you save favourites, set preferences, and subscribe for match digests."
      - q: "How do I create an account?"
        a: "Click 'Get started' and sign up with your email or Google account. The process takes under a minute."

  - category: "Matching & Discovery"
    questions:
      - q: "How does the matching engine work?"
        a: "Our engine compares your profile — target role, seniority, regions, salary — against every listing. Matches appear on your dashboard and in your weekly digest. The more you refine your preferences, the better the matches."
      - q: "What counts as a 'match'?"
        a: "A role our matching engine believes fits your CV, target title, seniority, region, and salary. You see them on your dashboard and in your weekly digest."
      - q: "How fast are matches delivered?"
        a: "Starter subscribers get email digests on a schedule you choose (daily or weekly). Managed includes unlimited discovery plus proactive notifications when strong roles open."
      - q: "Can I filter by country or region?"
        a: "Yes. Set your preferred regions in your profile. You can also use the advanced search to filter by country, type, salary range, and more."

  - category: "Billing & Plans"
    questions:
      - q: "What's the difference between Starter and Managed?"
        a: "Starter ($10/month) gives AI-matched jobs and digests — you apply yourself. Managed ($200/month) includes unlimited discovery, auto applications on your behalf, job notifications, interview preparation, and a dedicated agent."
      - q: "Can I cancel any time?"
        a: "Yes. Both plans are month-to-month. Cancel from the dashboard; access continues through the paid period."
      - q: "What payment methods are accepted?"
        a: "Card and mobile money via Flutterwave (including M-Pesa and other regional wallets where available)."
      - q: "Do you apply to jobs for me?"
        a: "Only on Managed. Starter surfaces matches and you apply from the dashboard or employer page. Managed auto-applies and supports interview prep."

  - category: "Listings & Quality"
    questions:
      - q: "Where do listings come from?"
        a: "We crawl thousands of company career pages, job boards, government portals, and institutional websites. Each listing is checked for freshness, a legitimate employer, and complete details before it appears."
      - q: "How often is the data updated?"
        a: "New opportunities are indexed continuously throughout the day. Our quality pipeline runs in near-real-time, so stale or closed listings are removed within hours."
      - q: "Can I submit a listing?"
        a: "Currently we don't accept direct submissions. Employers who want their openings indexed should ensure their career page is crawlable — our system will discover it automatically."
      - q: "What types of opportunities do you cover?"
        a: "Jobs (full-time, part-time, remote, contract), scholarships & bursaries, tenders & RFPs, deals & discounts, and funding & grants. We cover all industries and regions."

  - category: "Account & Privacy"
    questions:
      - q: "What information do you collect?"
        a: "We collect only what's needed to provide matches — your target role, seniority, regions, and salary range. Your CV is stored securely and never shared with employers without your explicit action."
      - q: "Can I delete my account?"
        a: "Yes. Go to your profile settings and select 'Delete account'. All your data is permanently removed within 48 hours."
      - q: "How is my data protected?"
        a: "All data is encrypted at rest and in transit. We use Ory Hydra for authentication and never store passwords. Our infrastructure runs on Google Cloud with SOC 2 compliance."
      - q: "Do you sell my data?"
        a: "Never. Your data belongs to you. We don't share, sell, or rent personal information to third parties. See our privacy policy for full details."

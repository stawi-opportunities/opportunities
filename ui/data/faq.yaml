categories:
  - category: "Getting Started"
    questions:
      - q: "What is Stawi Jobs?"
        a: "Stawi Jobs helps you find relevant roles from many boards and company career pages. Browse free, upload a CV to get a free match shortlist, then subscribe only if you want more weekly matches and email digests."
      - q: "Is Stawi Jobs free?"
        a: "Yes for browsing jobs and for free proof tools (CV ATS score, job-fit checker, and a capped match shortlist). Paid plans unlock higher match caps and digests: Starter ($10/mo) and Managed ($200/mo unlimited discovery + priority alerts)."
      - q: "Do I need an account to search?"
        a: "No. You can browse and search jobs without signing up. You need a free account to apply (we open the employer page and can track applications). An account also unlocks save, matches, free tools, and subscriptions."
      - q: "How do I create an account?"
        a: "Click Get started and sign in with email or Google. Setup takes about a minute."

  - category: "Matching & Discovery"
    questions:
      - q: "How does matching work?"
        a: "We compare your CV and preferences to job listings with AI embeddings and quality filters. Matches appear on your dashboard with a score. Use Find matches now after uploading a CV — free users get a proof shortlist."
      - q: "Do I have to pay before I see matches?"
        a: "No. You can see a free shortlist first. Subscribe when you want higher weekly caps and digests."
      - q: "What counts as a match?"
        a: "A role that scores above our quality threshold for your CV, skills, region, and salary preferences."
      - q: "How fast are matches delivered?"
        a: "Usually within minutes after CV upload and Find matches now. Paid digests follow your daily/weekly schedule in Settings."

  - category: "Tools"
    questions:
      - q: "What free tools do you offer?"
        a: "CV ATS score (parseability, keywords, impact, role fit, clarity) with priority improvement tips, and a job-fitness checker that compares a job description to your profile."
      - q: "Do tools require a paid plan?"
        a: "No. Tools are free for signed-in users."

  - category: "Billing & Plans"
    questions:
      - q: "What's the difference between Starter and Managed?"
        a: "Starter ($10/month): up to 5 AI matches per week plus digests. Managed ($200/month): unlimited discovery, priority match alerts, and uncapped match feed. Both open employer apply links; you apply yourself."
      - q: "Do you auto-apply to jobs for me?"
        a: "Not today. We open the employer apply page and can track that you applied. True auto-apply is not offered until we can do it reliably."
      - q: "Can I cancel any time?"
        a: "Yes. Plans are month-to-month. Cancel from the dashboard; access continues through the paid period."
      - q: "What payment methods are accepted?"
        a: "Card and mobile money via Flutterwave (including M-Pesa where available)."

  - category: "Listings & Quality"
    questions:
      - q: "Where do listings come from?"
        a: "We crawl company career pages and job boards with structured extracts (APIs, schema.org, recipes). Listings need a real title, description, employer, and apply URL."
      - q: "How often is data updated?"
        a: "Continuously. New roles surface throughout the day; stale listings age out of default search windows."
      - q: "Can employers post jobs?"
        a: "Direct recruiter ATS posting is planned. Today we discover openings by crawling public career pages."
      - q: "What types of opportunities do you cover?"
        a: "Jobs only. We focus on roles from company career pages and boards so search, matching, and apply stay high quality."

  - category: "Account & Privacy"
    questions:
      - q: "What information do you collect?"
        a: "Account identity, CV and preferences for matching, and application tracking you choose to log. We do not sell your data."
      - q: "Can I delete my account?"
        a: "Yes — from profile settings. Data is removed according to our privacy policy."
      - q: "How is my data protected?"
        a: "Encryption in transit and at rest, OIDC authentication, and restricted service access inside our cloud environment."

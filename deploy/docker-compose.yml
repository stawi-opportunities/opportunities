version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: stawi
      POSTGRES_PASSWORD: stawi
      POSTGRES_DB: stawijobs
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  opensearch:
    image: opensearchproject/opensearch:2.14.0
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"

volumes:
  pgdata:

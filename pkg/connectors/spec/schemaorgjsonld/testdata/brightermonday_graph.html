      "description": "<div><b>Duty Station</b>: Head Offices \u2013 Kitezi, Kitagobwa</div>\n\n<div><br></div>\n\n<div><b>Position Summary</b></div>\n\n<div>The Accountant will be responsible for managing financial records, petty cash, suppliers, and\u00a0company property, and ensuring compliance with statutory requirements. He/she will support the\u00a0organization\u2019s financial decision-making processes through accurate reporting and analysis.</div>\n\n<div><br></div>\n\n<div><b><br></b></div>\n\n<div><b>Key Responsibilities</b></div>\n\n<ul><li>Prepare, examine, and analyze financial records and reports.</li><li>Manage accounts payable and receivable functions.</li><li>Reconcile bank statements and maintain general ledger accuracy.</li><li>Manage petty cash, suppliers, and company property.</li><li>Prepare monthly, quarterly, and annual financial statements.</li><li>Ensure compliance with regulations and statutory requirements.</li><li>Manage payroll processing and related statutory deductions.</li><li>Monitor budgets and support financial planning processes.</li><li>Maintain proper documentation and filing of financial transactions.</li><li>Utilize QuickBooks for accounting operations and reporting.</li><li>Support audits and ensure timely submission of required reports.</li></ul>\n\n<div><br></div>\n\n<div><b>Minimum Requirements</b></div>\n\n<ul><li>Bachelor\u2019s Degree in Accounting and Finance or a related field.</li><li>Minimum of CPA Level III (or equivalent professional qualification).</li><li>At least 3 years of proven experience in accounting, handling a wide range of accounting\u00a0functions.</li><li>High proficiency in QuickBooks is a mandatory requirement.</li><li>Strong knowledge of financial regulations, tax laws, and reporting standards.</li><li>Excellent analytical, organizational, and problem-solving skills.</li><li>High level of integrity, professionalism, and attention to detail.</li></ul>\n\n<div><br></div>\n\n<div><br></div>\n\n<div><div><b>How to Apply:</b></div><div>All applications will be received and reviewed through the BrighterMonday Portal by clicking on the 'Apply Here' section</div></div>\n\n<div><br></div>\n\n<div><br></div>",
